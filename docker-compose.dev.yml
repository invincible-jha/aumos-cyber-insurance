version: "3.9"

services:
  cyber-insurance:
    build: .
    ports:
      - "8000:8000"
    environment:
      AUMOS_DATABASE_URL: postgresql+asyncpg://aumos:aumos@postgres:5432/aumos_cyber_insurance
      AUMOS_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUMOS_DEBUG: "true"
      AUMOS_INSURANCE_PREMIUM_DISCOUNT_CAP_PCT: "35.0"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./src:/app/src

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: aumos
      POSTGRES_PASSWORD: aumos
      POSTGRES_DB: aumos_cyber_insurance
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aumos"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  pgdata:
